<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    .container {
      padding: 20px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 24px;
      margin-bottom: 5px;
    }

    .header .subtitle {
      color: #8892b0;
      font-size: 12px;
    }

    .status-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
    }

    .status-row .label {
      color: #8892b0;
    }

    .status-ok {
      color: #4ade80;
    }

    .status-stop {
      color: #f87171;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .btn {
      flex: 1;
      padding: 12px 15px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }

    .btn-success {
      background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
      color: #fff;
    }

    .btn-danger {
      background: linear-gradient(135deg, #f87171 0%, #ef4444 100%);
      color: #fff;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .log-box {
      flex: 1;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      padding: 10px;
      font-family: 'Consolas', monospace;
      font-size: 11px;
      color: #a0aec0;
      overflow-y: auto;
      max-height: 150px;
    }

    .log-box .line {
      margin-bottom: 3px;
    }

    .footer {
      text-align: center;
      color: #4a5568;
      font-size: 11px;
      margin-top: 10px;
    }

    .footer a {
      color: #667eea;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🦞 OpenClaw</h1>
      <div class="subtitle">桌面版 · 一键启动</div>
    </div>

    <div class="status-card">
      <div class="status-row">
        <span class="label">运行状态</span>
        <span class="value" id="status">检测中...</span>
      </div>
      <div class="status-row">
        <span class="label">版本</span>
        <span class="value" id="version">检测中...</span>
      </div>
      <div class="status-row">
        <span class="label">端口</span>
        <span class="value">18789</span>
      </div>
    </div>

    <div class="btn-group">
      <button class="btn btn-success" id="btn-start">🚀 启动</button>
      <button class="btn btn-danger" id="btn-stop" disabled>⏹ 停止</button>
    </div>

    <div class="btn-group">
      <button class="btn btn-secondary" id="btn-config">⚙ 首次配置</button>
      <button class="btn btn-secondary" id="btn-open">🌐 打开界面</button>
    </div>

    <div class="log-box" id="log">
      <div class="line">等待初始化...</div>
    </div>

    <div class="footer">
      Powered by <a href="#" onclick="return false;">OpenClaw 中文社区</a>
    </div>
  </div>

  <script>
    const api = window.api;
    
    const statusEl = document.getElementById('status');
    const versionEl = document.getElementById('version');
    const btnStart = document.getElementById('btn-start');
    const btnStop = document.getElementById('btn-stop');
    const btnConfig = document.getElementById('btn-config');
    const btnOpen = document.getElementById('btn-open');
    const logEl = document.getElementById('log');

    let isRunning = false;

    // 日志
    function log(msg) {
      const div = document.createElement('div');
      div.className = 'line';
      div.textContent = `> ${msg}`;
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
    }

    // 更新状态显示
    function updateStatus(running) {
      isRunning = running;
      if (running) {
        statusEl.textContent = '已启动';
        statusEl.className = 'value status-ok';
        btnStart.disabled = true;
        btnStop.disabled = false;
      } else {
        statusEl.textContent = '已停止';
        statusEl.className = 'value status-stop';
        btnStart.disabled = false;
        btnStop.disabled = true;
      }
    }

    // 获取状态
    async function checkStatus() {
      try {
        log('正在获取状态...');
        const status = await api.getStatus();
        versionEl.textContent = status.version;
        updateStatus(status.running);
        log(`状态: ${status.running ? '已启动' : '已停止'}, 版本: ${status.version}`);
      } catch (e) {
        log('获取状态失败: ' + e.message);
        console.error('获取状态失败:', e);
      }
    }

    // 启动
    async function start() {
      btnStart.disabled = true;
      log('正在启动服务...');
      
      const result = await api.startGateway();
      if (result.success) {
        log(result.message);
        // 等待几秒后检查状态
        setTimeout(checkStatus, 3000);
      } else {
        log('启动失败: ' + result.message);
        btnStart.disabled = false;
      }
    }

    // 停止
    async function stop() {
      btnStop.disabled = true;
      log('正在停止服务...');
      
      const result = await api.stopGateway();
      log(result.message);
      updateStatus(false);
    }

    // 首次配置
    async function config() {
      btnConfig.disabled = true;
      log('开始首次配置...');
      
      const result = await api.runConfig();
      log(result.message);
      
      btnConfig.disabled = false;
    }

    // 打开界面
    async function openUI() {
      await api.openBrowser();
      log('已打开浏览器');
    }

    // 事件绑定
    btnStart.onclick = start;
    btnStop.onclick = stop;
    btnConfig.onclick = config;
    btnOpen.onclick = openUI;

    // 监听状态变化
    api.onStatusChanged((running) => {
      updateStatus(running);
    });

    // 监听控制台日志
    api.onConsoleLog((msg) => {
      log('[后端] ' + msg);
    });

    // 初始化 - 使用 setTimeout 延迟执行
    setTimeout(async () => {
      try {
        log('1. 测试连接...');
        const pingResult = await window.api.ping();
        log('2. 连接成功! ' + JSON.stringify(pingResult));
        
        log('3. 获取状态...');
        const status = await window.api.getStatus();
        log('4. 状态获取成功: ' + JSON.stringify(status));
        
        versionEl.textContent = status.version;
        updateStatus(status.running);
        log('状态: ' + (status.running ? '已启动' : '已停止') + ', 版本: ' + status.version);
      } catch (e) {
        log('错误: ' + e.message);
        console.error('初始化错误:', e);
      }
    }, 1000);
  </script>
</body>
</html>
