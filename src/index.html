<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    .container {
      padding: 20px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 24px;
      margin-bottom: 5px;
    }

    .header .subtitle {
      color: #8892b0;
      font-size: 12px;
    }

    .status-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
    }

    .status-row .label {
      color: #8892b0;
    }

    .status-ok {
      color: #4ade80;
    }

    .status-stop {
      color: #f87171;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .btn {
      flex: 1;
      padding: 12px 15px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }

    .btn-success {
      background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
      color: #fff;
    }

    .btn-danger {
      background: linear-gradient(135deg, #f87171 0%, #ef4444 100%);
      color: #fff;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .log-box {
      flex: 1;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      padding: 10px;
      font-family: 'Consolas', monospace;
      font-size: 11px;
      color: #a0aec0;
      overflow-y: auto;
      max-height: 150px;
    }

    .log-box .line {
      margin-bottom: 3px;
    }

    .footer {
      text-align: center;
      color: #4a5568;
      font-size: 11px;
      margin-top: 10px;
    }

    .footer a {
      color: #667eea;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🦞 OpenClaw</h1>
      <div class="subtitle">桌面版 · 一键启动</div>
    </div>

    <div class="status-card">
      <div class="status-row">
        <span class="label">运行状态</span>
        <span class="value" id="status">检测中...</span>
      </div>
      <div class="status-row">
        <span class="label">版本</span>
        <span class="value" id="version">检测中...</span>
      </div>
      <div class="status-row">
        <span class="label">端口</span>
        <span class="value">18789</span>
      </div>
    </div>

    <div class="btn-group">
      <button class="btn btn-success" id="btn-start">🚀 启动</button>
      <button class="btn btn-danger" id="btn-stop" disabled>⏹ 停止</button>
    </div>

    <div class="btn-group">
      <button class="btn btn-secondary" id="btn-settings">⚡ 快速配置</button>
      <button class="btn btn-secondary" id="btn-config">⚙ 完整配置</button>
    </div>

    <div class="log-box" id="log">
      <div class="line">等待初始化...</div>
    </div>

    <div class="footer">
      Powered by <a href="#" onclick="return false;">OpenClaw 中文社区</a>
    </div>
  </div>

  <script>
    // 直接执行初始化
    (async function() {
      try {
        const status = await window.api.getStatus();
        
        document.getElementById('version').textContent = status.version;
        
        const statusEl = document.getElementById('status');
        if (status.running) {
          statusEl.textContent = '已启动';
          statusEl.className = 'value status-ok';
        } else {
          statusEl.textContent = '已停止';
          statusEl.className = 'value status-stop';
        }
        
        document.getElementById('log').innerHTML = '<div class="line">OK! Version: ' + status.version + '</div><div class="line">Status: ' + (status.running ? 'Running' : 'Stopped') + '</div>';
      } catch (e) {
        document.getElementById('log').innerHTML = '<div class="line" style="color:red">ERROR: ' + e.message + '</div>';
      }
    })();
    
    // 按钮事件
    document.getElementById('btn-settings').onclick = async function() {
      // 快速配置：弹出简单输入框
      const apiKey = prompt('请输入 DeepSeek API Key:');
      if (apiKey && apiKey.trim()) {
        try {
          await window.api.saveConfig('deepseek', apiKey.trim());
          alert('配置保存成功！');
        } catch(e) {
          alert('保存失败: ' + e.message);
        }
      }
    };
    
    document.getElementById('btn-config').onclick = async function() {
      // 完整配置：调用原来的bat
      try {
        await window.api.runConfig();
      } catch(e) {
        alert('配置失败: ' + e.message);
      }
    };
  </script>
</body>
</html>
